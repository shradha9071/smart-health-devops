services:

  mongodb:
    image: mongo
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./server
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    env_file:
      - ./server/.env

  frontend:
    build: ./web
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongodb_data:
